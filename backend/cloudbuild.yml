steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/propfix-backend-go', '.']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/propfix-backend-go']
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'propfix-backend-go'
      - '--image=gcr.io/$PROJECT_ID/propfix-backend-go'
      - '--platform=managed'
      - '--region=us-central1'
